services:
  discordcodex:
    build:
      context: .
      dockerfile: Dockerfile
    image: discordcodex:local
    container_name: discordcodex
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DISCORDCODEX_CONFIG: /config/projects.json
      DISCORDCODEX_DATA_DIR: /data
      CODEX_BIN: codex
      # Set to "latest" to resolve OpenAI's current latest model at startup
      # and write it to DISCORDCODEX_CODEX_CONFIG.
      # DISCORDCODEX_CODEX_MODEL: latest
      # DISCORDCODEX_CODEX_CONFIG: /data/codex-home/shared/config.toml
      # Prefer *_FILE token inputs for Docker deployments, and mount
      # matching token files under /run/secrets if you enable them.
      # DISCORDCODEX_GITHUB_TOKEN_FILE: /run/secrets/discordcodex_github_token
    volumes:
      - ./config:/config:ro
      - ./data:/data
      # - ./secrets:/run/secrets:ro
      - /path/to/projects:/projects
