services:
  discordcodex:
    build:
      context: .
      dockerfile: Dockerfile
    image: discordcodex:local
    container_name: discordcodex
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DISCORDCODEX_CONFIG: /config/projects.json
      DISCORDCODEX_DATA_DIR: /data
      CODEX_BIN: codex
    volumes:
      - ./config:/config:ro
      - ./data:/data
      - /path/to/projects:/projects

