services:
  discordcodex:
    build:
      context: .
      dockerfile: Dockerfile
    image: discordcodex:local
    container_name: discordcodex
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DISCORDCODEX_CONFIG: /config/projects.json
      DISCORDCODEX_DATA_DIR: /data
      CODEX_BIN: codex
      # Prefer *_FILE token inputs for Docker deployments, and mount
      # matching token files under /run/secrets if you enable them.
      # DISCORDCODEX_GIT_CREDENTIAL_TOKEN_FILE: /run/secrets/discordcodex_git_token
      # DISCORDCODEX_GITHUB_API_TOKEN_FILE: /run/secrets/discordcodex_github_api_token
    volumes:
      - ./config:/config:ro
      - ./data:/data
      # - ./secrets:/run/secrets:ro
      - /path/to/projects:/projects
